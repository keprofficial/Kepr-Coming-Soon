<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KEPR — Coming Soon</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --red1: #ff5a5f;
      --red2: #ff3b3f;
      --red3: #ff7a7f;
      --text-dark: #0f172a;
      --muted: #64748b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: #ffffff;
      min-height: 100vh;

      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;

      padding: 20px;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .container {
      max-width: 1100px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;

      background: linear-gradient(-45deg, var(--red1), var(--red2), var(--red3));
      background-size: 300% 300%;
      animation: gradientMove 10s ease infinite;

      border-radius: 24px;
      padding: 50px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(20px);
      border-radius: 24px;
    }

    .container > * {
      position: relative;
      z-index: 2;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .content {
      animation: fadeIn 1s ease-in-out;
    }

    h1 {
      font-size: 42px;
      color: var(--text-dark);
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 30px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      background: white;
      padding: 8px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      max-width: 420px;
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      padding: 12px;
      font-size: 14px;
      border-radius: 8px;
    }

    input:focus {
      box-shadow: 0 0 0 2px rgba(255,90,95,0.3);
    }

    button {
      background: linear-gradient(135deg, var(--red1), var(--red2));
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(255,90,95,0.3);
    }

    .micro {
      font-size: 12px;
      margin-top: 10px;
      color: var(--muted);
    }

    .visual {
      display: flex;
      justify-content: center;
      animation: float 5s ease-in-out infinite;
    }

    .visual img {
      max-width: 100%;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      padding-bottom: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    /* MOBILE */
    @media(max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        padding: 30px 20px;
        gap: 30px;
        border-radius: 20px;
      }

      h1 {
        font-size: 28px;
        text-align: center;
      }

      p {
        font-size: 16px;
        text-align: center;
      }

      .content {
        text-align: center;
      }

      .content img {
        margin: 0 auto 20px;
      }

      .input-group {
        flex-direction: column;
        max-width: 100%;
      }

      input {
        width: 100%;
      }

      button {
        width: 100%;
      }

      .visual {
        order: 2;
      }

      .visual img {
        max-width: 85%;
      }
    }
  </style>
</head>

<body>

  <div class="main">
    <div class="container">

      <div class="content">
        <img src="logo.png" style="width:120px; margin-bottom:20px;" />

        <h1>Your Home. Taken Care Of.</h1>

        <p>
          Reliable, on-demand home services — launching soon.
        </p>

        <div class="input-group">
          <input type="email" placeholder="Enter your email"/>
          <button>Get Early Access</button>
        </div>

        <div class="micro">
          Be the first to experience smarter home care.
        </div>
      </div>

      <div class="visual">
        <img src="house.png" alt="KEPR Home Services"/>
      </div>

    </div>
  </div>

  <div class="footer">
    © 2026 KEPR — All rights reserved
  </div>

</body>
</html>
